name: Smarticket Scraper

on:
  schedule:
    - cron: "0 0,11 * * *"  
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Browser and Xvfb Dependencies
        run: |
          sudo apt update
          sudo apt install -y xvfb libnss3 libgbm1 libasound2t64 xauth
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sbase install chromedriver

      # NOTE: the previous "apt install chromium-browser" step was removed.
      # On ubuntu-latest, chromium-browser is a transitional *snap* package; apt
      # hands it to snapd, which intermittently fails to fetch snap assertions
      # (HTTP 408 from api.snapcraft.io), breaking the build with dpkg exit 100.
      # ubuntu-latest already ships Google Chrome pre-installed, and SeleniumBase
      # UC mode requires real Google Chrome (not the chromium snap) anyway.

      - name: Run scraper with Xvfb
        env:
          APPSHEET_APP_ID: ${{ secrets.APPSHEET_APP_ID }}
          APPSHEET_APP_KEY: ${{ secrets.APPSHEET_APP_KEY }}
          # DataImpulse Israeli residential proxy — routes Cloudflare-blocked
          # halls (e.g. tickets.friends-hist.co.il) through an IL residential IP,
          # since GitHub's datacenter IPs get blocked. Host/port default in code.
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python run_scraper.py
      - name: Upload screenshots
        if: always() # Ensure this runs even if the scraper fails
        uses: actions/upload-artifact@v4
        with:
          name: smarticket-screenshots
          path: screenshots/
          retention-days: 7

  keepalive:
    runs-on: ubuntu-latest
    needs: run-scraper
    if: ${{ github.event_name == 'schedule' }} # only run automatically, not on manual trigger
    permissions:
      contents: write
    steps:
      - name: 🌀 Checkout repo
        uses: actions/checkout@v4

      - name: 💾 Keep workflows alive (once a month)
        run: |
          if [ "$(date +%d)" = "01" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit --allow-empty -m "chore: keep workflows alive $(date)"
            git push
          else
            echo "Not the 1st of the month — skipping keepalive commit."
          fi
